name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            pkg_target: node20-macos-arm64
            tauri_target: aarch64-apple-darwin
            sidecar_triple: aarch64-apple-darwin
            sidecar_ext: ''
          - os: macos-14
            pkg_target: node20-macos-x64
            tauri_target: x86_64-apple-darwin
            sidecar_triple: x86_64-apple-darwin
            sidecar_ext: ''
          - os: ubuntu-22.04
            pkg_target: node20-linux-x64
            tauri_target: ''
            sidecar_triple: x86_64-unknown-linux-gnu
            sidecar_ext: ''
          - os: windows-2022
            pkg_target: node20-win-x64
            tauri_target: ''
            sidecar_triple: x86_64-pc-windows-msvc
            sidecar_ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Add macOS cross-compile target
        if: matrix.tauri_target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build frontend + server
        run: pnpm build

      - name: Rebuild better-sqlite3 for target
        shell: bash
        run: pnpm rebuild better-sqlite3

      - name: Bundle server (esbuild ESM->CJS)
        shell: bash
        run: |
          mkdir -p dist/bundle
          pnpm exec esbuild dist/cli/index.js \
            --bundle --platform=node --format=cjs --target=node20 \
            --outfile=dist/bundle/cli.cjs \
            --external:better-sqlite3 \
            --define:import.meta.url=_importMetaUrl \
            '--banner:js=var _importMetaUrl=require("url").pathToFileURL(__filename).href;'

      - name: Build sidecar executable (pkg)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          pnpm exec pkg dist/bundle/cli.cjs \
            --target ${{ matrix.pkg_target }} \
            --output "src-tauri/binaries/cc-devtool-server-${{ matrix.sidecar_triple }}${{ matrix.sidecar_ext }}" \
            --compress GZip
          ls -lh src-tauri/binaries/

      - name: Prepare Tauri signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_RAW" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY not set — skipping signing"
            exit 0
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY=$TAURI_SIGNING_PRIVATE_KEY_RAW" >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi
          echo "Tauri signing key prepared"

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 30
        run: |
          if [ -n "${{ matrix.tauri_target }}" ]; then
            pnpm tauri build --target "${{ matrix.tauri_target }}" --bundles dmg,updater
          else
            pnpm tauri build --bundles dmg,updater
          fi

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        shell: bash
        timeout-minutes: 30
        run: pnpm tauri build --bundles deb,rpm,appimage,updater

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        shell: bash
        timeout-minutes: 30
        run: pnpm tauri build --bundles msi,updater

      - name: Prepare macOS release assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.sidecar_triple }}"
          mkdir -p release-assets

          for dir in \
            "src-tauri/target/${{ matrix.tauri_target }}/release/bundle" \
            "src-tauri/target/release/bundle"; do

            DMG=$(find "$dir" -name "*.dmg" 2>/dev/null | head -1 || true)
            if [ -n "$DMG" ]; then
              cp "$DMG" "release-assets/cc-devtool-${VERSION}-macOS-${ARCH}.dmg"
              echo "DMG copied"
            fi

            TARGZ=$(find "$dir" -name "*.tar.gz" 2>/dev/null | head -1 || true)
            if [ -n "$TARGZ" ]; then
              cp "$TARGZ" "release-assets/cc-devtool-${VERSION}-macOS-${ARCH}.tar.gz"
              [ -f "$TARGZ.sig" ] && cp "$TARGZ.sig" "release-assets/cc-devtool-${VERSION}-macOS-${ARCH}.tar.gz.sig"
              echo "tar.gz copied"
            fi
          done

          ls -la release-assets/

      - name: Prepare Linux release assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          APPIMAGE=$(find src-tauri/target/release/bundle -name "*.AppImage" 2>/dev/null | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-assets/cc-devtool-${VERSION}-Linux-x86_64.AppImage"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/cc-devtool-${VERSION}-Linux-x86_64.AppImage.sig"
          fi

          DEB=$(find src-tauri/target/release/bundle -name "*.deb" 2>/dev/null | head -1 || true)
          [ -n "$DEB" ] && cp "$DEB" "release-assets/cc-devtool-${VERSION}-Linux-x86_64.deb"

          RPM=$(find src-tauri/target/release/bundle -name "*.rpm" 2>/dev/null | head -1 || true)
          [ -n "$RPM" ] && cp "$RPM" "release-assets/cc-devtool-${VERSION}-Linux-x86_64.rpm"

          ls -la release-assets/

      - name: Prepare Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $msi) {
            $dest = "cc-devtool-$VERSION-Windows.msi"
            Copy-Item $msi.FullName (Join-Path release-assets $dest)
            $sigPath = "$($msi.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets "$dest.sig")
            }
          }

          Get-ChildItem release-assets

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.sidecar_triple }}
          path: release-assets/*
          if-no-files-found: warn

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    if: always() && !cancelled()
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release-assets/ || echo "No artifacts"

      - name: Prepare release body
        id: body
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="docs/release-notes/v${VERSION}-en.md"
          BODY_FILE="release-body.md"

          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" "$BODY_FILE"
          else
            cat > "$BODY_FILE" <<FALLBACK
          ## cc-devtool ${GITHUB_REF_NAME}

          AI Agent Execution Debugger

          ### Download

          - **macOS (ARM64)**: cc-devtool-${GITHUB_REF_NAME}-macOS-aarch64-apple-darwin.dmg
          - **macOS (x64)**: cc-devtool-${GITHUB_REF_NAME}-macOS-x86_64-apple-darwin.dmg
          - **Windows**: cc-devtool-${GITHUB_REF_NAME}-Windows.msi
          - **Linux (x86_64)**: .AppImage / .deb / .rpm

          ### npm

          \`\`\`bash
          npm install -g cc-devtool
          \`\`\`
          FALLBACK
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: cc-devtool ${{ github.ref_name }}
          prerelease: false
          body_path: release-body.md
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    if: always() && needs.publish-release.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY" || true
          ls -la dl/ || true

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"

          mac_arm64_url="" ; mac_arm64_sig=""
          mac_x64_url=""   ; mac_x64_sig=""
          win_url=""       ; win_sig=""
          linux_x64_url="" ; linux_x64_sig=""

          shopt -s nullglob
          for sig in dl/*.sig; do
            base="${sig%.sig}"
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *macOS*aarch64*.tar.gz)   mac_arm64_url="$url" ; mac_arm64_sig="$sig_content" ;;
              *macOS*x86_64*.tar.gz)    mac_x64_url="$url"   ; mac_x64_sig="$sig_content"   ;;
              *Linux*x86_64*.AppImage)  linux_x64_url="$url" ; linux_x64_sig="$sig_content"  ;;
              *.msi)                    win_url="$url"       ; win_sig="$sig_content"        ;;
            esac
          done

          {
            echo '{'
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"Release $TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_arm64_url" ] && [ -n "$mac_arm64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"darwin-aarch64\": {\"signature\": \"$mac_arm64_sig\", \"url\": \"$mac_arm64_url\"}"
              first=0
            fi
            if [ -n "$mac_x64_url" ] && [ -n "$mac_x64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"darwin-x86_64\": {\"signature\": \"$mac_x64_sig\", \"url\": \"$mac_x64_url\"}"
              first=0
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
